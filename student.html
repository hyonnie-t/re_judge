<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조정 결과</title>
<style>
  :root {
    --bg: #FBF3EC;
    --card: #FFFFFF;
    --pink: #F0728C;
    --pink-soft: #FDE4E9;
    --ink: #3A2E2A;
    --sub: #8A7A73;
    --line: #EFE2D8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    padding: 40px 16px;
    min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .badge {
    display: inline-block;
    background: var(--pink-soft); color: var(--pink);
    font-size: 12px; padding: 4px 10px; border-radius: 999px; margin-bottom: 12px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--sub); font-size: 13px; margin-bottom: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px;
    line-height: 1.7;
    font-size: 15px;
    white-space: pre-wrap;
  }
  .footer { text-align: center; font-size: 12px; color: var(--sub); margin-top: 20px; }
  .loading, .error { text-align: center; color: var(--sub); padding: 60px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div id="content" class="loading">불러오는 중...</div>
</div>

<script>
// admin.html과 동일한 GAS 배포 URL을 여기에 고정해서 넣어줘.
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyNIHYz3lEPEhDa95RN6Y8A-55YzcS84V7dFvggPLAjPCUDm3FikGauqU0kL-NIz6LJ/exec';

async function load() {
  const token = new URLSearchParams(location.search).get('token');
  const contentEl = document.getElementById('content');
  if (!token) {
    contentEl.innerHTML = '<div class="error">잘못된 링크야.</div>';
    return;
  }
  try {
    const res = await fetch(`${GAS_URL}?action=view&token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (data.error) {
      contentEl.innerHTML = '<div class="error">아직 확인할 수 있는 내용이 없어. 선생님께 다시 확인해줘.</div>';
      return;
    }
    contentEl.innerHTML = `
      <span class="badge">조정 결과</span>
      <h1>${escapeHtml(data.students)}</h1>
      <div class="sub">효니 선생님이 검토·승인한 내용이야</div>
      <div class="card">${escapeHtml(data.teacherFinalText)}</div>
      <div class="footer">궁금한 점은 선생님께 직접 물어봐줘.</div>
    `;
  } catch (e) {
    contentEl.innerHTML = '<div class="error">불러오는 중 오류가 났어. 잠시 후 다시 시도해줘.</div>';
  }
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

load();
</script>
</body>
</html>
